<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="data:," />

    <title>Arlo — A calm companion for mental wellness</title>
    <meta
      name="description"
      content="Arlo is a calm, private space to think out loud about anxiety, sleep, stress, and everyday emotions. Not a therapist, not a substitute for professional care."
    />
    <meta
      name="keywords"
      content="mental wellness, anxiety, stress, journaling, grounding, AI companion, mindfulness, emotional support, mental health UAE"
    />
    <meta name="author" content="Arlo" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15140F" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="https://arlo.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Arlo" />
    <meta property="og:title" content="Arlo — A calm companion for mental wellness" />
    <meta
      property="og:description"
      content="A calm space to think out loud about anxiety, sleep, stress, and everyday emotions. Not a therapist."
    />
    <meta property="og:url" content="https://arlo.app/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arlo — A calm companion for mental wellness" />
    <meta
      name="twitter:description"
      content="A calm space to think out loud. Not a therapist, not a substitute for professional care."
    />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Arlo",
        "description": "A calm, private space to think out loud about anxiety, sleep, stress, and everyday emotions. Not a therapist, not a substitute for professional care.",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web",
        "url": "https://arlo.app/",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "audience": { "@type": "Audience", "audienceType": "Adults seeking everyday emotional support" },
        "disambiguatingDescription": "Arlo is a non-clinical AI companion. It is not a therapist, doctor, or medical professional, and does not diagnose or prescribe."
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@1,400;1,500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Arlo is an interactive chat that needs JavaScript. Please enable JavaScript or visit
      <a href="https://findahelpline.com">findahelpline.com</a> if you need support now.
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
